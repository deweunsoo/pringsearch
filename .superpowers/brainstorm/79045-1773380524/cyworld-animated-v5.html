<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#2a2a2a; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Noto Sans KR',sans-serif; }
  .scene { width:500px; height:580px; position:relative; overflow:hidden; border:3px solid #333; border-radius:8px; }
  svg.pixel { image-rendering:pixelated; image-rendering:crisp-edges; }

  .bubble {
    position:absolute; background:#fff; border:3px solid #333; padding:7px 10px;
    font-size:11px; color:#333; max-width:145px; line-height:1.5; text-align:left;
    opacity:0; transform:scale(0.8) translateY(5px);
    transition: opacity 0.3s, transform 0.3s; z-index:20;
  }
  .bubble.show { opacity:1; transform:scale(1) translateY(0); }
  .bubble::after {
    content:''; position:absolute; bottom:-9px; width:14px; height:14px;
    background:inherit; border-right:3px solid #333; border-bottom:3px solid #333;
    transform:rotate(45deg);
  }
  .bubble.left::after { left:16px; }
  .bubble.right::after { right:16px; }

  .char { position:absolute; text-align:center; z-index:10; cursor:pointer; }
  .char:hover .char-body { transform:scale(1.08); }
  .char-body { transition:transform 0.2s; }

  @keyframes breathe { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
  @keyframes bounce { 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-8px) rotate(-3deg)} 50%{transform:translateY(0)} 75%{transform:translateY(-5px) rotate(3deg)} }
  @keyframes nod { 0%,100%{transform:translateY(0) rotate(0)} 30%{transform:translateY(2px) rotate(3deg)} 60%{transform:translateY(0) rotate(-1deg)} }
  @keyframes think { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-1px) rotate(-2deg)} }
  @keyframes boss { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1px)} }
  @keyframes talking { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }
  @keyframes heartFloat { 0%{opacity:0;transform:translateY(0) scale(0)} 30%{opacity:1;transform:translateY(-5px) scale(1)} 100%{opacity:0;transform:translateY(-18px) scale(0.6)} }
  @keyframes dotPulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1.2)} }

  /* 배경 애니메이션 */
  @keyframes steam { 0%{transform:translateY(0) scaleX(1);opacity:0.6} 50%{transform:translateY(-8px) scaleX(1.4);opacity:0.3} 100%{transform:translateY(-16px) scaleX(0.6);opacity:0} }
  @keyframes fishSwim { 0%{transform:translateX(0)} 50%{transform:translateX(20px)} 100%{transform:translateX(0)} }
  @keyframes fishSwim2 { 0%{transform:translateX(0) scaleX(1)} 49%{transform:translateX(-15px) scaleX(1)} 50%{transform:translateX(-15px) scaleX(-1)} 99%{transform:translateX(0) scaleX(-1)} 100%{transform:translateX(0) scaleX(1)} }
  @keyframes bubble1 { 0%{transform:translateY(0);opacity:0.8} 100%{transform:translateY(-25px);opacity:0} }
  @keyframes clockTick { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
  @keyframes catTail { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
  @keyframes catBlink { 0%,90%,100%{height:3px} 95%{height:0.5px} }
  @keyframes lampGlow { 0%,100%{opacity:0.3} 50%{opacity:0.5} }
  @keyframes rainDrop { 0%{transform:translateY(-10px);opacity:0} 50%{opacity:0.4} 100%{transform:translateY(50px);opacity:0} }
  @keyframes cloudMove { 0%{transform:translateX(0)} 100%{transform:translateX(8px)} }

  .name-tag { font-size:10px; font-weight:bold; margin-top:3px; color:#333; }
  .typing-bar {
    position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center;
    gap:8px; padding:10px 16px; background:rgba(255,255,255,0.92); border-top:3px solid #333; z-index:30;
  }
  .typing-dots { display:flex; gap:3px; }
  .typing-dots span { width:6px; height:6px; background:#333; border-radius:50%; animation:dotPulse 1.4s infinite ease-in-out; }
  .typing-dots span:nth-child(2) { animation-delay:0.2s; }
  .typing-dots span:nth-child(3) { animation-delay:0.4s; }
</style>
</head>
<body>

<div class="scene">

  <!-- ====== 배경: 벽 ====== -->

    <div style="position:absolute;bottom:3px;left:30px;width:1.5px;height:1.5px;background:rgba(255,255,255,0.5);border-radius:50%;animation:bubble1 2.5s infinite 0.8s;"></div>

  <!-- ====== 시계 (오른쪽 벽, 분침 돌아감) ====== -->

  <!-- ====== 책장 (왼쪽 벽 아래) ====== -->

  <!-- ====== 커피머신 (왼쪽 바닥) ====== -->

  <!-- ====== 픽셀 캐릭터들 ====== -->

  <!-- Gemini 사원 -->

};
const MESSAGES = [
  { who:'gemini', text:'와!! 오늘 리서치 봤어?? AI 코딩 도구 성장 속도가 미쳤어 ㄷㄷㄷ', emote:'🤩' },

  { who:'claude', text:'팀 관점에서 보면 교육 비용도 같이 따져봐야 해. 러닝커브가 만만치 않거든.', emote:'🧐' },

  { who:'perplexity', text:'데이터를 보면 답은 명확해. 도입 기업 중 87%가 생산성 향상을 보고했어.', emote:'📈' },
  { who:'claude', text:'그 수치는 알겠는데, 우리 팀 상황에 맞는지는 다른 문제야. 기술 스택도 고려해야지.', emote:'⚠️' },

];
let msgIdx=0, isAnimating=false;
function showTyping(who){const bar=document.getElementById('typing-bar'),av=document.getElementById('typing-avatar'),nm=document.getElementById('typing-name');av.style.background=CHARS[who].color;nm.textContent=CHARS[who].name+'이 입력 중';bar.style.display='flex';}
function hideTyping(){document.getElementById('typing-bar').style.display='none';}
function showBubble(who,text){document.querySelectorAll('.bubble').forEach(b=>b.classList.remove('show'));const bubble=document.getElementById('bubble-'+who);bubble.textContent=text;const tail=document.createElement('div');tail.style.cssText='position:absolute;bottom:-9px;width:14px;height:14px;background:inherit;border-right:3px solid #333;border-bottom:3px solid #333;transform:rotate(45deg);';if(bubble.classList.contains('left'))tail.style.left='16px';else tail.style.right='16px';bubble.appendChild(tail);bubble.classList.add('show');}
function showEmoteEffect(who,emoji){const el=document.getElementById('emote-'+who);el.textContent=emoji;el.style.animation='none';el.offsetHeight;el.style.animation='heartFloat 1.2s ease-out forwards';}
function setCharAnimation(who,anim){document.querySelector('#'+who+' .char-body').style.animation=anim;}
function nextMessage(){if(isAnimating||msgIdx>=MESSAGES.length){if(msgIdx>=MESSAGES.length){msgIdx=0;setTimeout(nextMessage,2000);}return;}isAnimating=true;const msg=MESSAGES[msgIdx];showTyping(msg.who);setCharAnimation(msg.who,'talking 0.4s infinite ease-in-out');const t=800+Math.random()*1200;setTimeout(()=>{hideTyping();showBubble(msg.who,msg.text);showEmoteEffect(msg.who,msg.emote);setTimeout(()=>{const a={gemini:'bounce 1.8s infinite ease-in-out',gpt:'nod 3s infinite ease-in-out',claude:'think 4s infinite ease-in-out',perplexity:'boss 3s infinite ease-in-out'};setCharAnimation(msg.who,a[msg.who]);},600);msgIdx++;isAnimating=false;setTimeout(nextMessage,2500+Math.random()*1500);},t);}
function emote(who){const info=CHARS[who];showEmoteEffect(who,info.emotes[Math.floor(Math.random()*info.emotes.length)]);}
setTimeout(nextMessage,1000);
