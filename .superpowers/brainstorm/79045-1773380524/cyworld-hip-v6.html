<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a1a; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Noto Sans KR',sans-serif; }
  .scene { width:560px; height:600px; position:relative; overflow:hidden; border:3px solid #333; border-radius:8px; }
  svg.pixel { image-rendering:pixelated; image-rendering:crisp-edges; }

  .bubble {
    position:absolute; background:rgba(255,255,255,0.95); backdrop-filter:blur(8px);
    border-radius:16px; padding:8px 12px 8px 12px;
    font-size:11.5px; color:#333; min-width:150px; max-width:220px; line-height:1.55; text-align:left; word-break:keep-all;
    opacity:0; transform:scale(0.85) translateY(8px);
    transition: opacity 0.35s cubic-bezier(0.34,1.56,0.64,1), transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index:20; box-shadow:0 4px 16px rgba(0,0,0,0.25), 0 1px 3px rgba(0,0,0,0.15);
  }
  .bubble.show { opacity:1; transform:scale(1) translateY(0); }
  .bubble .bubble-name {
    font-size:10px; font-weight:700; margin-bottom:3px; letter-spacing:-0.2px;
  }
  .bubble .bubble-text {
    font-size:11.5px; line-height:1.55; color:#2a2a2a;
  }
  /* 꼬리: SVG로 부드럽게 */
  .bubble::after { content:none; }
  .bubble .tail {
    position:absolute; bottom:-8px; width:16px; height:10px;
  }
  .bubble .tail.tail-left { left:14px; }
  .bubble .tail.tail-right { right:14px; transform:scaleX(-1); }

  .char { position:absolute; text-align:center; z-index:10; cursor:pointer; }
  .char:hover .char-body { transform:scale(1.08); }
  .char-body { transition:transform 0.2s; }

  @keyframes bounce { 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-8px) rotate(-3deg)} 50%{transform:translateY(0)} 75%{transform:translateY(-5px) rotate(3deg)} }
  @keyframes nod { 0%,100%{transform:translateY(0) rotate(0)} 30%{transform:translateY(2px) rotate(3deg)} 60%{transform:translateY(0) rotate(-1deg)} }
  @keyframes think { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-1px) rotate(-2deg)} }
  @keyframes boss { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1px)} }
  @keyframes talking { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }
  @keyframes heartFloat { 0%{opacity:0;transform:translateY(0) scale(0)} 30%{opacity:1;transform:translateY(-5px) scale(1)} 100%{opacity:0;transform:translateY(-18px) scale(0.6)} }
  @keyframes dotPulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1.2)} }
  @keyframes steam { 0%{transform:translateY(0) scaleX(1);opacity:0.6} 50%{transform:translateY(-8px) scaleX(1.4);opacity:0.3} 100%{transform:translateY(-16px) scaleX(0.6);opacity:0} }

  /* 네온 글로우 */
  @keyframes neonPulse { 0%,100%{opacity:0.9;filter:drop-shadow(0 0 4px var(--c)) drop-shadow(0 0 8px var(--c))} 50%{opacity:1;filter:drop-shadow(0 0 6px var(--c)) drop-shadow(0 0 14px var(--c)) drop-shadow(0 0 20px var(--c))} }
  @keyframes neonFlicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1;filter:drop-shadow(0 0 5px var(--c)) drop-shadow(0 0 12px var(--c))} 20%,24%,55%{opacity:0.5;filter:none} }
  @keyframes vinylSpin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  @keyframes plantSway { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
  @keyframes starTwinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }
  @keyframes cityLight { 0%,100%{opacity:0.6} 50%{opacity:1} }
  @keyframes eqBar { 0%,100%{height:3px} 50%{height:var(--h)} }
  @keyframes ledFlow { 0%{background-position:0 0} 100%{background-position:200px 0} }
  @keyframes smokeRise { 0%{transform:translateY(0) translateX(0);opacity:0.3} 50%{transform:translateY(-15px) translateX(5px);opacity:0.15} 100%{transform:translateY(-30px) translateX(-3px);opacity:0} }

  .name-tag { font-size:10px; font-weight:bold; margin-top:3px; color:#ddd; text-shadow:0 0 6px rgba(255,255,255,0.3); }
  .typing-bar {
    position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center;
    gap:8px; padding:10px 16px; background:rgba(30,25,35,0.95); border-top:2px solid #444; z-index:30;
  }
  .typing-dots { display:flex; gap:3px; }
  .typing-dots span { width:6px; height:6px; background:#aaa; border-radius:50%; animation:dotPulse 1.4s infinite ease-in-out; }
  .typing-dots span:nth-child(2) { animation-delay:0.2s; }
  .typing-dots span:nth-child(3) { animation-delay:0.4s; }
</style>
</head>

<script>
const CHARS={gemini:{name:'Gemini 사원',color:'#4285F4',emotes:['✨','🤩','💡','🎉']},gpt:{name:'GPT 대리',color:'#10A37F',emotes:['🤔','📋','💻','👍']},claude:{name:'Claude 과장',color:'#D97706',emotes:['🧐','📊','⚠️','💭']},perplexity:{name:'Perplexity 사장',color:'#7C3AED',emotes:['📈','💼','🔥','👊']}};
const MESSAGES=[
  {who:'gemini',text:'와!! 오늘 리서치 봤어?? AI 코딩 도구 성장 속도가 미쳤어 ㄷㄷㄷ',emote:'🤩'},
  {who:'gpt',text:'ㅋㅋ 흥분은 알겠는데, 실무에서 쓸 수 있는지가 중요하지. 파일럿부터 해보자.',emote:'🤔'},
  {who:'claude',text:'팀 관점에서 보면 교육 비용도 같이 따져봐야 해. 러닝커브가 만만치 않거든.',emote:'🧐'},
  {who:'gemini',text:'아 근데 진짜 써보면 바로 적응돼요! 제가 어제 해봤는데 코드 자동완성이 진짜...',emote:'✨'},
  {who:'gpt',text:'자동완성이 좋은 건 맞는데, 보안 이슈는 확인했어? 내부 코드 유출 가능성도 있어.',emote:'📋'},
  {who:'perplexity',text:'데이터를 보면 답은 명확해. 도입 기업 중 87%가 생산성 향상을 보고했어.',emote:'📈'},
  {who:'claude',text:'그 수치는 알겠는데, 우리 팀 상황에 맞는지는 다른 문제야. 기술 스택도 고려해야지.',emote:'⚠️'},
  {who:'perplexity',text:'좋아. 그러면 2주 파일럿 후 결정하지. GPT 대리가 리드해.',emote:'💼'},
  {who:'gpt',text:'넵, 기준 잡고 보고서 올릴게요. 사원은 테스트 케이스 좀 만들어봐.',emote:'👍'},
  {who:'gemini',text:'오 저요?! 좋아요!! 진짜 열심히 해볼게요!! 💪💪',emote:'🎉'},
];
let msgIdx=0,isAnimating=false;
function showTyping(who){const bar=document.getElementById('typing-bar'),av=document.getElementById('typing-avatar'),nm=document.getElementById('typing-name');av.style.background=CHARS[who].color;nm.textContent=CHARS[who].name+'이 입력 중';bar.style.display='flex';}
function hideTyping(){document.getElementById('typing-bar').style.display='none';}
function showBubble(who,text){
  document.querySelectorAll('.bubble').forEach(b=>b.classList.remove('show'));
  const bubble=document.getElementById('bubble-'+who);
  const info=CHARS[who];
  const isLeft=bubble.classList.contains('left');
  const tailDir=isLeft?'tail-left':'tail-right';
  bubble.innerHTML=`
    <div class="bubble-name" style="color:${info.color}">${info.name}</div>
    <div class="bubble-text">${text}</div>
    <svg class="tail ${tailDir}" viewBox="0 0 16 10" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 0C0 0 3 0 6 4C9 8 12 10 16 10C11 10 6 8 4 6C2 4 0 2 0 0Z" fill="rgba(255,255,255,0.95)"/>
    </svg>
  `;
  bubble.classList.add('show');
}
function showEmoteEffect(who,emoji){const el=document.getElementById('emote-'+who);el.textContent=emoji;el.style.animation='none';el.offsetHeight;el.style.animation='heartFloat 1.2s ease-out forwards';}
function setCharAnimation(who,anim){document.querySelector('#'+who+' .char-body').style.animation=anim;}
function nextMessage(){if(isAnimating||msgIdx>=MESSAGES.length){if(msgIdx>=MESSAGES.length){msgIdx=0;setTimeout(nextMessage,2000);}return;}isAnimating=true;const msg=MESSAGES[msgIdx];showTyping(msg.who);setCharAnimation(msg.who,'talking 0.4s infinite ease-in-out');const t=800+Math.random()*1200;setTimeout(()=>{hideTyping();showBubble(msg.who,msg.text);showEmoteEffect(msg.who,msg.emote);setTimeout(()=>{const a={gemini:'bounce 1.8s infinite ease-in-out',gpt:'nod 3s infinite ease-in-out',claude:'think 4s infinite ease-in-out',perplexity:'boss 3s infinite ease-in-out'};setCharAnimation(msg.who,a[msg.who]);},600);msgIdx++;isAnimating=false;setTimeout(nextMessage,2500+Math.random()*1500);},t);}
function emote(who){const info=CHARS[who];showEmoteEffect(who,info.emotes[Math.floor(Math.random()*info.emotes.length)]);}
setTimeout(nextMessage,1000);
</script>
