<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#2a2a2a; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Noto Sans KR',sans-serif; }
  .scene { width:480px; height:560px; position:relative; overflow:hidden; border:3px solid #333; border-radius:8px; background:#C8C4A0; }

  /* 픽셀 렌더링 */
  svg.pixel { image-rendering:pixelated; image-rendering:crisp-edges; }

  /* 말풍선 */
  .bubble {
    position:absolute; background:#fff; border:3px solid #333; padding:7px 10px;
    font-size:11px; color:#333; max-width:145px; line-height:1.5; text-align:left;
    opacity:0; transform:scale(0.8) translateY(5px);
    transition: opacity 0.3s, transform 0.3s;
    z-index:20;
  }
  .bubble.show { opacity:1; transform:scale(1) translateY(0); }
  .bubble::after {
    content:''; position:absolute; bottom:-9px; width:14px; height:14px;
    background:inherit; border-right:3px solid #333; border-bottom:3px solid #333;
    transform:rotate(45deg);
  }
  .bubble.left::after { left:16px; }
  .bubble.right::after { right:16px; }

  /* 캐릭터 컨테이너 */
  .char { position:absolute; text-align:center; z-index:10; cursor:pointer; }
  .char:hover .char-body { transform:scale(1.08); }
  .char-body { transition:transform 0.2s; }

  /* === 애니메이션들 === */

  /* 숨쉬기 (기본) */
  @keyframes breathe {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-2px); }
  }

  /* 신남 (사원 - 통통 뛰기) */
  @keyframes bounce {
    0%,100% { transform:translateY(0) rotate(0deg); }
    25% { transform:translateY(-8px) rotate(-3deg); }
    50% { transform:translateY(0) rotate(0deg); }
    75% { transform:translateY(-5px) rotate(3deg); }
  }

  /* 고개 끄덕 (대리) */
  @keyframes nod {
    0%,100% { transform:translateY(0) rotate(0deg); }
    30% { transform:translateY(2px) rotate(3deg); }
    60% { transform:translateY(0) rotate(-1deg); }
  }

  /* 팔짱 끼고 생각 (과장) */
  @keyframes think {
    0%,100% { transform:translateY(0) rotate(0deg); }
    50% { transform:translateY(-1px) rotate(-2deg); }
  }

  /* 위엄있게 (사장) */
  @keyframes boss {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-1px); }
  }

  /* 커피 김 */
  @keyframes steam {
    0% { transform:translateY(0) scaleX(1); opacity:0.7; }
    50% { transform:translateY(-6px) scaleX(1.3); opacity:0.3; }
    100% { transform:translateY(-12px) scaleX(0.8); opacity:0; }
  }

  /* 반짝이 (감탄) */
  @keyframes sparkle {
    0%,100% { opacity:0; transform:scale(0); }
    50% { opacity:1; transform:scale(1); }
  }

  /* 물음표 */
  @keyframes questionPop {
    0%,100% { opacity:0; transform:translateY(0) scale(0); }
    20% { opacity:1; transform:translateY(-4px) scale(1.2); }
    40% { opacity:1; transform:translateY(-2px) scale(1); }
    80% { opacity:1; transform:translateY(-2px) scale(1); }
  }

  /* 하트 */
  @keyframes heartFloat {
    0% { opacity:0; transform:translateY(0) scale(0); }
    30% { opacity:1; transform:translateY(-5px) scale(1); }
    100% { opacity:0; transform:translateY(-18px) scale(0.6); }
  }

  /* 말할 때 좌우 흔들 */
  @keyframes talking {
    0%,100% { transform:rotate(0deg); }
    25% { transform:rotate(-4deg); }
    75% { transform:rotate(4deg); }
  }

  /* 타이핑 점 */
  @keyframes dotPulse {
    0%,80%,100% { opacity:0.2; transform:scale(0.8); }
    40% { opacity:1; transform:scale(1.2); }
  }

  /* 이름표 */
  .name-tag {
    font-size:10px; font-weight:bold; margin-top:3px; color:#333;
  }

  /* 타이핑 바 */
  .typing-bar {
    position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center;
    gap:8px; padding:10px 16px; background:rgba(255,255,255,0.92); border-top:3px solid #333;
    z-index:30;
  }
  .typing-dots { display:flex; gap:3px; }
  .typing-dots span {
    width:6px; height:6px; background:#333; border-radius:50%;
    animation:dotPulse 1.4s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay:0.2s; }
  .typing-dots span:nth-child(3) { animation-delay:0.4s; }
</style>
</head>

function showBubble(who, text) {
  // 다른 말풍선 숨기기
  document.querySelectorAll('.bubble').forEach(b => b.classList.remove('show'));
  const bubble = document.getElementById('bubble-' + who);
  bubble.textContent = text;
  // 꼬리 다시 추가 (textContent가 지움)
  const tail = document.createElement('div');
  tail.style.cssText = 'position:absolute;bottom:-9px;width:14px;height:14px;background:inherit;border-right:3px solid #333;border-bottom:3px solid #333;transform:rotate(45deg);';
  if (bubble.classList.contains('left')) tail.style.left = '16px';
  else tail.style.right = '16px';
  bubble.appendChild(tail);
  bubble.classList.add('show');
}

function showEmoteEffect(who, emoji) {
  const el = document.getElementById('emote-' + who);
  el.textContent = emoji;
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = 'heartFloat 1.2s ease-out forwards';
}

function setCharAnimation(who, anim) {
  const charEl = document.querySelector('#' + who + ' .char-body');
  charEl.style.animation = anim;
}

function nextMessage() {
  if (isAnimating || msgIdx >= MESSAGES.length) {
    if (msgIdx >= MESSAGES.length) {
      msgIdx = 0; // loop
      setTimeout(nextMessage, 2000);
    }
    return;
  }
  isAnimating = true;
  const msg = MESSAGES[msgIdx];

  // 1. 타이핑 표시
  showTyping(msg.who);

  // 캐릭터 애니메이션 변경 (말하는 중)
  setCharAnimation(msg.who, 'talking 0.4s infinite ease-in-out');

  // 2. 1~2초 후 말풍선 표시
  const typingTime = 800 + Math.random() * 1200;
  setTimeout(() => {
    hideTyping();
    showBubble(msg.who, msg.text);
    showEmoteEffect(msg.who, msg.emote);

    // 말하는 애니메이션을 원래대로
    setTimeout(() => {
      const anims = { gemini:'bounce 1.8s infinite ease-in-out', gpt:'nod 3s infinite ease-in-out', claude:'think 4s infinite ease-in-out', perplexity:'boss 3s infinite ease-in-out' };
      setCharAnimation(msg.who, anims[msg.who]);
    }, 600);

    msgIdx++;
    isAnimating = false;

    // 다음 메시지
    setTimeout(nextMessage, 2500 + Math.random() * 1500);
  }, typingTime);
}

// 클릭하면 이모트
function emote(who) {
  const info = CHARS[who];
  const emoji = info.emotes[Math.floor(Math.random() * info.emotes.length)];
  showEmoteEffect(who, emoji);
}

// 시작
setTimeout(nextMessage, 1000);
</script>
